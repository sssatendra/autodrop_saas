services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: autodrop
      POSTGRES_PASSWORD: autodrop_secret
      POSTGRES_DB: autodrop_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U autodrop -d autodrop_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - autodrop_network

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - autodrop_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      FLASK_APP: wsgi.py
      FLASK_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/api/v1/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - autodrop_network

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    command: celery -A app.celery_app:celery worker --loglevel=info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - autodrop_network

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    command: celery -A app.celery_app:celery beat --loglevel=info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - autodrop_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:5000
    depends_on:
      - backend
    networks:
      - autodrop_network

volumes:
  pgdata:


networks:
  autodrop_network:
    driver: bridge
